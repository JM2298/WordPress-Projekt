<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordPress Login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: #fffaf2;
            --text: #1b1b1b;
            --muted: #6a6258;
            --border: #d8ccb8;
            --accent: #0f766e;
            --accent-hover: #115e59;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(15, 118, 110, 0.18), transparent 28%),
                linear-gradient(160deg, #f7f2ea 0%, var(--bg) 100%);
            padding: 24px;
        }

        main {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px 28px;
            box-shadow: 0 24px 60px rgba(33, 24, 14, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
            background: #fff;
        }

        input:focus {
            outline: 2px solid rgba(15, 118, 110, 0.22);
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 13px 16px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .hint {
            margin-top: 18px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .link-button {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .link-button:hover {
            color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <main>
        <h1>Sign in</h1>
        <p>Use your WordPress username and password. This form submits a POST request directly to WordPress.</p>
        <form method="post" action="/wp-login.php">
            <label for="log">
                Login
                <input id="log" name="log" type="text" autocomplete="username" required>
            </label>

            <label for="pwd">
                Password
                <input id="pwd" name="pwd" type="password" autocomplete="current-password" required>
            </label>

            <input type="hidden" name="redirect_to" value="/wp-admin/">
            <input type="hidden" name="wp-submit" value="Log In">
            <input type="hidden" name="testcookie" value="1">

            <button type="submit">Log In</button>
        </form>
        <div class="actions">
            <a class="link-button" href="/frontend-register">Create account</a>
        </div>
        <p class="hint">Open <code>/frontend-login</code> after the containers are running.</p>
    </main>
</body>
</html>
